# Builds the Vite client and deploys client/dist to GitHub Pages.
# Enable: Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.
# Site URL: https://<user>.github.io/<repo>/
# If the repo is <user>.github.io (user site at domain root), change the build env to:
#   VITE_BASE: /

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install client dependencies
        working-directory: client
        run: npm ci
      - name: Build static site
        working-directory: client
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build
      - name: Configure Pages
        uses: actions/configure-pages@v4
        with:
          # Creates/enables Pages for the repo when not set up yet (needs pages:write).
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
